<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8714A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8714A" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Dark background circle for favicon context -->
  <rect width="32" height="32" rx="4" fill="#0F1117"/>
  <!-- Hexagon border -->
  <polygon
    points="16,3 27.3,9.5 27.3,22.5 16,29 4.7,22.5 4.7,9.5"
    fill="none"
    stroke="url(#shieldGrad)"
    stroke-width="2"
    stroke-linejoin="round"
  />
  <!-- Inner shield/armor motif: chevron pointing down -->
  <path
    d="M16,9 L22,14 L16,19 L10,14 Z"
    fill="none"
    stroke="#E8714A"
    stroke-width="1.5"
    stroke-linejoin="round"
    opacity="0.85"
  />
  <!-- Lower shield point -->
  <path
    d="M12,16 L16,23 L20,16"
    fill="none"
    stroke="#E8714A"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"
  />
</svg>
