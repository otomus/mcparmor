name: Homebrew Tap Update

# Triggered automatically after a successful release so the formula
# always tracks the latest published version.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: write

jobs:
  update-tap:
    name: Update Formula/mcparmor.rb
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $tag"

      - name: Download macOS release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p release-artifacts
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "mcparmor-macos-arm64" \
            --pattern "mcparmor-macos-x86_64" \
            --pattern "checksums.sha256" \
            --dir release-artifacts

      - name: Extract SHA256 values
        id: sha
        run: |
          arm64_sha=$(grep "mcparmor-macos-arm64"  release-artifacts/checksums.sha256 | awk '{print $1}')
          x86_64_sha=$(grep "mcparmor-macos-x86_64" release-artifacts/checksums.sha256 | awk '{print $1}')
          echo "arm64=$arm64_sha"   >> "$GITHUB_OUTPUT"
          echo "x86_64=$x86_64_sha" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          X86_64_SHA="${{ steps.sha.outputs.x86_64 }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          python3 - Formula/mcparmor.rb "$VERSION" "$ARM64_SHA" "$X86_64_SHA" "$BASE_URL" <<'PYEOF'
          import re, sys

          formula_path, version, arm64_sha, x86_64_sha, base_url = sys.argv[1:]

          with open(formula_path) as f:
              content = f.read()

          content = re.sub(r'version "[^"]*"', f'version "{version}"', content)

          content = re.sub(
              r'(if Hardware::CPU\.arm\?.*?url ")[^"]*(")',
              rf'\g<1>{base_url}/mcparmor-macos-arm64\2',
              content, flags=re.DOTALL,
          )
          content = re.sub(
              r'(if Hardware::CPU\.arm\?.*?sha256 ")[^"]*(")',
              rf'\g<1>{arm64_sha}\2',
              content, flags=re.DOTALL,
          )

          content = re.sub(
              r'(else.*?url ")[^"]*(")',
              rf'\g<1>{base_url}/mcparmor-macos-x86_64\2',
              content, flags=re.DOTALL,
          )
          content = re.sub(
              r'(else.*?sha256 ")[^"]*(")',
              rf'\g<1>{x86_64_sha}\2',
              content, flags=re.DOTALL,
          )

          with open(formula_path, "w") as f:
              f.write(content)

          print(f"Formula updated to version {version}")
          PYEOF

      - name: Commit and push
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/mcparmor.rb
          git commit -m "chore: update mcparmor formula to ${TAG}"
          git push
