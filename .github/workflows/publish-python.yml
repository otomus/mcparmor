name: Publish Python SDK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.0)"
        required: true

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.platform_tag }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - binary_name: mcparmor-linux-x86_64
            platform_tag: manylinux_2_28_x86_64
          - binary_name: mcparmor-linux-aarch64
            platform_tag: manylinux_2_28_aarch64
          - binary_name: mcparmor-macos-arm64
            platform_tag: macosx_14_0_arm64
          - binary_name: mcparmor-macos-x86_64
            platform_tag: macosx_13_0_x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download pre-built binary from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p sdks/python/src/mcparmor/bin
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          gh release download "$TAG" \
            --pattern "${{ matrix.binary_name }}" \
            --dir sdks/python/src/mcparmor/bin
          mv "sdks/python/src/mcparmor/bin/${{ matrix.binary_name }}" \
             sdks/python/src/mcparmor/bin/mcparmor
          chmod +x sdks/python/src/mcparmor/bin/mcparmor

      - name: Build wheel
        working-directory: sdks/python
        run: |
          pip install hatchling wheel
          python -m hatchling build -t wheel
          # Rename pure wheel to platform-specific
          cd dist
          for whl in *.whl; do
            python -c "
          import re, sys
          old = sys.argv[1]
          new = re.sub(r'py3-none-any', 'py3-none-${{ matrix.platform_tag }}', old)
          if old != new:
              import os; os.rename(old, new)
              print(f'Renamed {old} -> {new}')
          " "$whl"
          done

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform_tag }}
          path: sdks/python/dist/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
