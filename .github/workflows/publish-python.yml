name: Publish Python SDK

on:
  release:
    types: [published]

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            binary_name: mcparmor-linux-x86_64
          - os: ubuntu-latest
            arch: aarch64
            binary_name: mcparmor-linux-aarch64
          - os: macos-latest
            arch: arm64
            binary_name: mcparmor-macos-arm64
          - os: macos-latest
            arch: x86_64
            binary_name: mcparmor-macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Download pre-built binary from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p sdks/python/src/mcparmor/bin
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "${{ matrix.binary_name }}" \
            --dir sdks/python/src/mcparmor/bin
          mv "sdks/python/src/mcparmor/bin/${{ matrix.binary_name }}" \
             sdks/python/src/mcparmor/bin/mcparmor
          chmod +x sdks/python/src/mcparmor/bin/mcparmor

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        with:
          package-dir: sdks/python
          output-dir: wheelhouse
        env:
          CIBW_BUILD: "cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_SKIP: "*-win32 *-manylinux_i686"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    needs: build-wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
