name: Publish Node SDK

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download pre-built binaries from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          mkdir -p sdks/node/bin

          for asset in mcparmor-linux-x86_64 mcparmor-linux-aarch64 mcparmor-macos-arm64 mcparmor-macos-x86_64; do
            gh release download "$TAG" --pattern "$asset" --dir sdks/node/bin
          done

          gh release download "$TAG" --pattern "mcparmor.exe" --dir sdks/node/bin

          chmod +x sdks/node/bin/mcparmor-*

      - name: Build SDK
        working-directory: sdks/node
        run: npm ci && npm run build

      - name: Publish to npm
        working-directory: sdks/node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
